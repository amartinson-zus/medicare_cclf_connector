name: DuckDB dbt PR Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  dbt_duckdb:
    name: dbt parse, unit tests, and DuckDB build
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ./integration_tests/profiles/local_duckdb
      DBT_DUCKDB_PATH: /tmp/medicare_cclf_connector_ci.duckdb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python_version

      - name: Install dbt dependencies
        run: uv run dbt deps

      - name: Parse project
        run: uv run dbt parse

      - name: Run unit tests
        run: uv run dbt test --select "package:medicare_cclf_connector,test_type:unit"

      - name: Load local raw fixtures
        run: uv run dbt seed --full-refresh --select package:medicare_cclf_connector --vars '{"demo_data_only": true}'

      - name: Build connector project
        run: uv run dbt build --full-refresh --select package:medicare_cclf_connector --exclude resource_type:seed --vars '{"demo_data_only": false, "input_database": "medicare_cclf_connector_ci", "input_schema": "raw"}'
