version: 2

unit_tests:
  - name: int_enrollment_collapses_contiguous_member_months
    description: Member-month enrollment rows are rolled up into contiguous enrollment spans and split on month gaps.
    model: int_enrollment
    overrides:
      vars:
        member_months_enrollment: true
        cms_alr_connector: false
        demo_data_only: false
    given:
      - input: ref('stg_enrollment')
        format: sql
        rows: |
          select 'MBI-A' as current_bene_mbi_id, cast(null as date) as enrollment_start_date, cast(null as date) as enrollment_end_date, cast('2024-01-01' as date) as bene_member_month
          union all select 'MBI-A', cast(null as date), cast(null as date), cast('2024-02-01' as date)
          union all select 'MBI-A', cast(null as date), cast(null as date), cast('2024-04-01' as date)
          union all select 'MBI-B', cast(null as date), cast(null as date), cast('2024-03-01' as date)
    expect:
      format: sql
      rows: |
        select 'MBI-A' as current_bene_mbi_id, cast('2024-01-01' as date) as enrollment_start_date, cast('2024-02-29' as date) as enrollment_end_date
        union all select 'MBI-A', cast('2024-04-01' as date), cast('2024-04-30' as date)
        union all select 'MBI-B', cast('2024-03-01' as date), cast('2024-03-31' as date)

