  - name: int_medical_claim_winning_keys_selects_latest_branch_rows
    description: Cross-branch medical claim ranking first dedupes branch row keys, then picks the latest claim-line winner.
    model: int_medical_claim_winning_keys
    given:
      - input: ref('int_institutional_claim_deduped')
        format: sql
        rows: |
          select 'CLAIM-1' as claim_id, '1' as claim_line_number, 'inst_old.csv' as file_name, cast('2024-01-01' as date) as file_date, cast('2024-01-10' as date) as paid_date, 'inst-older' as branch_row_key
          union all select 'CLAIM-2', '1', 'inst_branch_old.csv', cast('2024-01-01' as date), cast('2024-01-10' as date), 'same-branch'
          union all select 'CLAIM-2', '1', 'inst_branch_new.csv', cast('2024-02-01' as date), cast('2024-02-10' as date), 'same-branch'
      - input: ref('int_physician_claim_deduped')
        format: sql
        rows: |
          select 'CLAIM-1' as claim_id, '1' as claim_line_number, 'physician_new.csv' as file_name, '2024-03-01' as ingest_datetime, cast('2024-03-10' as date) as paid_date, 'physician-newer' as branch_row_key
      - input: ref('int_dme_claim_deduped')
        format: sql
        rows: |
          select 'CLAIM-1' as claim_id, '1' as claim_line_number, 'dme_old.csv' as file_name, '2024-02-01' as ingest_datetime, cast('2024-02-10' as date) as paid_date, 'dme-middle' as branch_row_key
    expect:
      format: sql
      rows: |
        select 'physician-newer' as branch_row_key, 1 as row_num
        union all select 'dme-middle', 2
        union all select 'inst-older', 3
        union all select 'same-branch', 1
